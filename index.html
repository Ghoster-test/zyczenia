<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Życzenia Urodzinowe dla Jakuba</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');

    :root {
      --bg-color: #080708;
      --card-bg: #141213;
      --text-gold: #c5a880;
      --text-muted: #8e8784;
      --text-light: #eae6e1;
      --rose-pink: #d67080;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Kontener elastyczny dopasowujący się do ekranu (komputer / telefon) */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 420px;
      margin: auto;
    }

    /* Szablon mobilny / podgląd */
    .mobile-container {
      width: 100%;
      background: radial-gradient(circle at center, #181113 0%, #080708 100%);
      border-radius: 40px;
      padding: 40px 24px 35px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: all 0.3s ease;
    }

    /* Dopasowanie do małych ekranów smartfonów */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .mobile-container {
        border-radius: 28px;
        padding: 30px 18px 25px 18px;
        box-shadow: none;
      }
      .card {
        padding: 20px;
        border-radius: 22px;
      }
      .card-title {
        font-size: 1.5rem;
      }
    }

    /* Sekcja z różą */
    .rose-container {
      position: relative;
      width: 190px;
      height: 190px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rose-shadow {
      position: absolute;
      width: 160px;
      height: 160px;
      background: #3a111a;
      border-radius: 50%;
      filter: blur(25px);
      opacity: 0.8;
      bottom: -10px;
      z-index: 1;
    }

    .rose-circle {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #eed5c8; /* Brzoskwiniowe kółko w tle */
      border-radius: 50%;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible; /* Pozwala róży wyjść poza okrąg */
    }

    /* Zdjęcie róży wystające poza okrąg */
    .rose-image {
      position: absolute;
      width: 125%;
      height: 125%;
      object-fit: contain;
      bottom: -8px;
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: multiply; /* Ukrywa ewentualne białe tło z pliku */
    }

    /* Karta z tekstem */
    .card {
      width: 100%;
      background-color: var(--card-bg);
      border: 1px solid #1f1b1c;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-gold);
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .card-header .heart {
      font-size: 0.85rem;
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.7rem;
      font-weight: 400;
      line-height: 1.35;
      margin-bottom: 18px;
      color: #ffffff;
    }

    .card-title span.highlight {
      color: #ecc5c8;
    }

    .divider {
      width: 55px;
      height: 1.2px;
      background-color: var(--text-gold);
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .quote-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #ebdcd3;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .author {
      text-align: right;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* Odtwarzacz audio dopasowany do szerokości */
    .audio-player {
      background-color: #1a1718;
      border: 1px solid #221e1f;
      border-radius: 18px;
      padding: 14px 18px;
    }

    .audio-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--text-gold);
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .play-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: #272123;
      border: 1px solid #3c3336;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .play-btn:hover {
      background-color: #332b2d;
      border-color: #4d4145;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid #ffffff;
      margin-left: 3px;
    }

    .pause-icon {
      display: none;
      gap: 3px;
    }

    .pause-icon span {
      width: 3px;
      height: 12px;
      background-color: #ffffff;
      border-radius: 1px;
    }

    /* Słupki fali dźwiękowej rozciągnięte równomiernie */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: space-between; /* Równomierne rozłożenie słupków */
      flex-grow: 1; /* Wypełnia całą wolną przestrzeń */
      height: 24px;
    }

    .bar {
      width: 3px;
      background-color: var(--rose-pink);
      border-radius: 2px;
      transition: height 0.15s ease;
    }

    /* Dolna plakietka */
    .badge {
      background-color: #141213;
      border: 1px solid #232021;
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    
    <!-- Szablon podglądu -->
    <div class="mobile-container">
      
      <!-- Sekcja z różą -->
      <div class="rose-container">
        <div class="rose-shadow"></div>
        <div class="rose-circle">
          <!-- Ścieżka do pliku roza.png -->
          <img class="rose-image" src="roza.png" alt="Róża">
        </div>
      </div>

      <!-- Karta główna -->
      <div class="card">
        <div class="card-header">
          <span class="heart">♥</span> JAKUB
        </div>
        
        <div class="card-title">
          <span class="highlight">Wujek Oskar</span> podarował Ci różę
        </div>
        
        <div class="divider"></div>
        
        <div class="quote-text">
          "Wszystkiego najlepszego z okazji urodzin! Dużo zdrowia, szczęścia, spełnienia marzeń, sukcesów i wielu powodów do uśmiechu. Niech każdy dzień będzie pełen radości i samych dobrych chwil. Sto lat!"
        </div>
        
        <div class="author">
          — Wujek Oskar
        </div>

        <!-- Odtwarzacz audio -->
        <div class="audio-player">
          <div class="audio-label">WIADOMOŚĆ GŁOSOWA</div>
          <div class="audio-controls">
            <button class="play-btn" id="play-btn">
              <div class="play-icon" id="play-icon"></div>
              <div class="pause-icon" id="pause-icon">
                <span></span>
                <span></span>
              </div>
            </button>
            
            <!-- Słupki fali dźwiękowej (zwiększona ilość do 28) -->
            <div class="waveform" id="waveform">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Dolna plakietka -->
      <div class="badge">
        <span>✨</span> ZAKWITŁA 9 LIPCA 2026 ROKU
      </div>

    </div>

  </div>

  <!-- Ukryty odtwarzacz HTML5 dla dzwiek.mp3 -->
  <audio id="real-audio-player" src="dzwiek.mp3"></audio>

  <script>
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const bars = document.querySelectorAll('.bar');
    const realAudioPlayer = document.getElementById('real-audio-player');

    let isPlaying = false;
    let animationInterval = null;

    const barHeights = [4, 12, 18, 8, 14, 22, 16, 10, 6, 12, 20, 14, 8, 18, 22, 12, 6, 10, 4];
    
    function resetWaveform() {
      bars.forEach((bar, index) => {
        bar.style.height = `${barHeights[index % barHeights.length]}px`;
      });
    }
    
    resetWaveform();

    // Reset po zakończeniu nagrania
    realAudioPlayer.addEventListener('ended', function() {
      pauseAudio();
      realAudioPlayer.currentTime = 0;
    });

    function togglePlay() {
      if (isPlaying) {
        pauseAudio();
      } else {
        playAudio();
      }
    }

    function playAudio() {
      isPlaying = true;
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'flex';
      
      realAudioPlayer.play().catch(error => {
        console.log("Brak pliku dzwiek.mp3 lub brak zgody przeglądarki na autoodtwarzanie.", error);
      });
      
      animationInterval = setInterval(() => {
        bars.forEach((bar) => {
          const randomHeight = Math.floor(Math.random() * 18) + 4;
          bar.style.height = `${randomHeight}px`;
        });
      }, 100);
    }

    function pauseAudio() {
      isPlaying = false;
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      realAudioPlayer.pause();
      
      clearInterval(animationInterval);
      resetWaveform();
    }

    playBtn.addEventListener('click', togglePlay);
  </script>
</body>
</html>
